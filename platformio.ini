[env:esp32dev]
platform      = espressif32
board         = esp32dev
framework     = arduino
monitor_speed = 115200

lib_ldf_mode  = deep+
lib_extra_dirs = lib

lib_deps =
    adafruit/DHT sensor library @ ^1.4.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    knolleary/PubSubClient @ ^2.8

; ─── Test Environment ────────────────────────────────────────────
[env:esp32dev_test]
platform      = espressif32
board         = esp32dev
framework     = arduino
lib_ldf_mode  = deep+
test_framework = unity
test_filter   = test_*

lib_deps =
    adafruit/DHT sensor library @ ^1.4.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    knolleary/PubSubClient @ ^2.8